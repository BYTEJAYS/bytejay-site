/* ============================================================================
   The Journey — cinematic treasure-map loader
   A rolled parchment descends, unfolds, and traces Jay's real chapters
   (Origins · Discovery · The Search · The Detour · In Between) while the
   WebGL island loads behind it. When the island is truly ready AND the
   map sequence has run its minimum arc, the marker reaches the Isle of Jay,
   the shaders warm up behind the parchment, then the map opens to reveal it.
   Built to reuse the page's existing readiness signals (the "raising the
   island · N%" text + the "Travel" button) — no fake timers.
   ============================================================================ */
#jrny-map{--jm-ink:#f7f3ec;--jm-paper:#dce9df;--jm-paper-deep:#8da99a;--jm-accent:#ff7654;--jm-water:#6f9f97;

  color:#faf7f3;font-family:'Archivo',system-ui,-apple-system,sans-serif;

  background-image:radial-gradient(circle,rgba(250,247,243,.05) 1px,transparent 1px);

  transform:translateX(-50%);border-radius:14px;z-index:5;
  background:linear-gradient(180deg,#7c5230 0%,#5f3c20 12%,#8a5c34 32%,#4e3018 62%,#3a2312 100%);

    '<rect x="10" y="10" width="980" height="620" rx="14" fill="%23fff" filter="url(%23r)"/></svg>')+"\")";

  /* ---- build the map’s inner SVG ------------------------------------------- */
  function d(pts){ // catmull-rom -> cubic bezier smooth path
    var p='M'+pts[0][0]+' '+pts[0][1];
    for(var i=0;i<pts.length-1;i++){
      var p0=pts[i>0?i-1:i],p1=pts[i],p2=pts[i+1],p3=pts[i+2<pts.length?i+2:i+1];
      var c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      var c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      p+=' C'+c1x+' '+c1y+','+c2x+' '+c2y+','+p2[0]+' '+p2[1];
    }
    return p;
  }
  var ROUTE=d(PTS);

  // nautical chapter markers along the crossing
  var LAND=[
    /* Origins — harbour lighthouse */
    '<path class="jm-ink" d="M-8 13 L-5 -10 L5 -10 L8 13 Z M-11 13 L11 13"/>'+
      '<path class="jm-ink" d="M-8 -10 L8 -10 L4 -16 L-4 -16 Z M-15 -13 L-9 -13 M9 -13 L15 -13"/>',
    /* Discovery — compass star */
    '<circle class="jm-ink" cx="0" cy="0" r="12"/><path class="jm-ink" d="M0 -15 L4 -3 L15 0 L4 3 L0 15 L-4 3 L-15 0 L-4 -3 Z"/>',
    /* The Search — signal buoy */
    '<path class="jm-ink" d="M-8 12 L-5 -3 L5 -3 L8 12 Z M-12 12 L12 12 M0 -3 L0 -14"/>'+
      '<path class="jm-ink" d="M-4 -11 Q0 -15 4 -11 M-8 -8 Q0 -18 8 -8"/>',
    /* The Detour — split current */
    '<path class="jm-ink" d="M0 14 L0 -2 Q0 -9 -9 -13 M0 -2 Q0 -9 9 -13"/>'+
      '<path class="jm-ink" d="M-14 -11 L-9 -13 L-10 -8 M14 -11 L9 -13 L10 -8"/>',
    /* In Between — the isle of Jay with a flag */
    '<path class="jm-ink" d="M-16 12 q16 8 32 0 q-4 -8 -16 -8 q-12 0 -16 8 Z"/>'+
      '<path class="jm-ink" d="M2 4 L2 -16 L14 -12 L2 -9"/>'
  ];

  var lands='',lb='';
  for(var i=0;i<STOPS.length;i++){
    var pt=PTS[STOP_IDX[i]];var s=STOPS[i];
    var above=pt[1]>320; // put the label above the pin low on the map, below when high
    var ly=above?pt[1]-46:pt[1]+40;
    var num=['I','II','III','IV','V'][i];
    var short=s.ch.split('· ')[1];
    lands+='<g class="jm-land" data-i="'+i+'" transform="translate('+pt[0]+','+pt[1]+')">'+
      '<circle class="jm-halo" cx="0" cy="0" r="6"/>'+
      '<g transform="translate(0,-2)">'+LAND[i]+'</g>'+
      '<circle class="jm-pin" cx="0" cy="6" r="3.6"/>'+
      '<text class="jm-label" x="0" y="'+(above?-30:44)+'" text-anchor="middle">'+short+'</text>'+
      '<text class="jm-label jm-label--num" x="0" y="'+(above?-30+15:44+15)+'" text-anchor="middle">'+num+'</text>'+
      '</g>';
  }

  var svg=
    '<svg class="jm-svg" viewBox="0 0 1000 640" preserveAspectRatio="xMidYMid meet" aria-hidden="true">'+
      '<defs>'+
        '<filter id="jm-ink" x="-8%" y="-40%" width="116%" height="180%">'+
          '<feTurbulence type="fractalNoise" baseFrequency="0.018 0.03" numOctaves="2" seed="9" result="n"/>'+
          '<feDisplacementMap in="SourceGraphic" in2="n" scale="7"/></filter>'+
        '<radialGradient id="jm-sea" cx="50%" cy="50%" r="60%">'+
          '<stop offset="0%" stop-color="#c9b184" stop-opacity="0"/>'+
          '<stop offset="100%" stop-color="#b89a67" stop-opacity="0.5"/></radialGradient>'+
      '</defs>'+
      /* a complete hand-drawn world: coast, islands, contour lines and waves */
      '<g class="jm-terrain" fill="none" stroke="#b7d1c5" stroke-width="1.35" opacity="0.42">'+
        '<path d="M46 485 q95 -42 178 -14 q86 31 164 6 q76 -25 142 -3 q92 31 174 -4 q103 -43 250 9"/>'+
        '<path d="M72 502 q88 -35 166 -8 q82 29 154 7 q78 -24 144 -2 q91 31 174 -4 q102 -41 218 4" opacity=".45"/>'+
        '<path d="M92 253 q55 -38 122 -10 q37 17 69 -4 q47 -30 102 -7 M594 294 q61 -46 137 -11 q42 20 84 -6" opacity=".7"/>'+
        '<path d="M64 342 q12 11 0 22 M47 368 q12 11 0 22 M935 306 q12 11 0 22 M958 332 q12 11 0 22"/>'+
      '</g>'+
      '<g fill="#d8e5dc" opacity=".13" stroke="#d8e5dc" stroke-width="1.4">'+
        '<path d="M238 150 q34 -26 72 -3 q34 21 75 2 q31 -14 61 10 q-23 27 -65 24 q-55 -4 -101 10 q-33 -8 -42 -43Z"/>'+
        '<path d="M670 123 q41 -26 81 2 q26 18 61 8 q31 18 13 43 q-45 13 -78 -2 q-43 -19 -86 1 q-20 -27 9 -52Z"/>'+
        '<path d="M774 493 q37 -31 79 -4 q32 20 70 3 q25 30 -7 51 q-41 -10 -76 7 q-45 10 -66 -18 q-12 -17 0 -39Z"/>'+
      '</g>'+
      '<g fill="none" stroke="#d8e5dc" stroke-width="1.1" opacity=".24">'+
        '<path d="M258 158 q45 -19 92 3 q29 13 61 1 M690 139 q48 -17 96 6 M796 508 q45 -18 91 4"/>'+
        '<path d="M875 184 l12 -19 l12 19 l-12 19Z M91 552 l9 -14 l9 14 l-9 14Z"/>'+
      '</g>'+
      /* compass rose, upper-left flourish */
      '<g transform="translate(150,150)" stroke="#f7f3ec" fill="#f7f3ec" opacity="0.52">'+
        '<circle r="26" fill="none" stroke-width="1.4"/><circle r="17" fill="none" stroke-width="1"/>'+
        '<path d="M0 -30 L4 -6 L0 0 L-4 -6 Z"/><path d="M0 30 L4 6 L0 0 L-4 6 Z" opacity="0.55"/>'+
        '<path d="M30 0 L6 4 L0 0 L6 -4 Z" opacity="0.7"/><path d="M-30 0 L-6 4 L0 0 L-6 -4 Z" opacity="0.7"/>'+
        '<text x="0" y="-34" text-anchor="middle" font-family="Newsreader,serif" font-style="italic" font-size="12">N</text>'+
      '</g>'+
      /* the destination rises from the horizon before the boat reaches it */
      '<g transform="translate(884,425)" opacity=".92">'+
        '<ellipse cx="0" cy="13" rx="76" ry="15" fill="#0b2823" opacity=".65"/>'+
        '<path d="M-67 8 Q-44 -10 -23 -5 Q-4 -40 20 -14 Q48 -20 68 8 Q28 24 -5 18 Q-38 25 -67 8Z" fill="#52796c"/>'+
        '<path d="M-15 -7 Q-2 -52 17 -9Z" fill="#b8cbc0" opacity=".78"/>'+
        '<path d="M38 0 L38 -30 L55 -24 L38 -18" fill="none" stroke="#faf7f3" stroke-width="2"/>'+
      '</g>'+
      '<path class="jm-route-glow" d="'+ROUTE+'"/>'+
      '<path class="jm-route" id="jmRoute" d="'+ROUTE+'"/>'+
      lands+
      /* X marks the destination */
      '<g class="jm-x" id="jmX" transform="translate('+PTS[7][0]+','+PTS[7][1]+')">'+
        '<path d="M-11 -11 L11 11 M11 -11 L-11 11"/></g>'+
      /* travelling boat marker — light SVG geometry, no second WebGL scene */
      '<g class="jm-marker" id="jmMarker">'+
        '<path class="jm-wake" d="M-18 9 Q-27 13 -34 9 M-15 14 Q-23 18 -29 15"/>'+
        '<path class="jm-hull" d="M-17 4 L18 4 L11 15 L-9 15 Q-14 11 -17 4Z"/>'+
        '<path class="jm-mast" d="M0 5 L0 -19"/>'+
        '<path class="jm-sail" d="M-2 -17 L-2 2 L-15 2 Q-10 -10 -2 -17Z"/>'+
        '<path class="jm-sail" d="M2 -14 L2 2 L13 2 Q10 -7 2 -14Z" opacity=".76"/></g>'+
    '</svg>';

  /* ---- assemble the overlay ------------------------------------------------ */
  var el=document.createElement('div');el.id='jrny-map';
  el.setAttribute('role','status');el.setAttribute('aria-label','Charting the journey');
  el.style.setProperty('--fibre',fibre);
  el.style.setProperty('--deckle',deckle);
  el.innerHTML=
    '<div class="jm-stage" id="jmStage"><div class="jm-scroll">'+
      '<div class="jm-rod jm-rod--top" id="jmRodTop"></div>'+
      '<div class="jm-roll jm-roll--top" id="jmRollTop"></div>'+
      '<div class="jm-window" id="jmWindow"><div class="jm-sheet">'+
        '<div class="jm-voyage-model"><canvas class="jm-model-canvas" id="jmModelCanvas" aria-label="A 3D boat sailing toward an island and unlocking it with a key"></canvas><div class="jm-ocean-disc"></div>'+
          '<div class="jm-boat-model"><span class="jm-boat__wake"></span><span class="jm-boat__hull"></span><span class="jm-boat__deck"></span><span class="jm-boat__mast"></span><span class="jm-boat__sail jm-boat__sail--cream"></span><span class="jm-boat__sail jm-boat__sail--coral"></span></div>'+
          '<div class="jm-key-model"><span class="jm-key__ring"></span><span class="jm-key__shaft"></span><span class="jm-key__teeth"></span></div>'+
          '<div class="jm-island-lock"><span class="jm-lock"></span></div></div>'+
        '<p class="jm-eyebrow">Voyage_Sequence / 01</p>'+
        '<h2 class="jm-heading">Sailing to the Isle of Jay<small>every journey needs a crossing</small></h2>'+
        svg+
        '<div class="jm-caption" id="jmCaption">'+
          '<div class="jm-swap"><div class="jm-chapter" id="jmCh"></div>'+
          '<div class="jm-line" id="jmLine"></div></div></div>'+
      '</div></div>'+
      '<div class="jm-roll jm-roll--bottom" id="jmRollBottom"></div>'+
      '<div class="jm-rod jm-rod--bottom" id="jmRodBottom"></div>'+
    '</div><div class="jm-status"><span class="jm-status__lamp"></span><span class="jm-status__track"><i id="jmStatusTrack"></i></span><b class="jm-status__copy" id="jmStatusCopy">Voyage · 01 / 05</b></div></div>'+
    '<button type="button" class="jm-enter" id="jmEnter">Skip intro</button>';

  var done=false;
  function host(){return document.body||document.documentElement;}
  function ensure(){if(done)return;if(el.parentNode!==host()){host().appendChild(el);}}
  ensure();
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',ensure);
  window.addEventListener('load',ensure);
  var mo;try{mo=new MutationObserver(ensure);mo.observe(document.documentElement,{childList:true,subtree:true});}catch(e){}

  var stage=el.querySelector('#jmStage'),
      rodTop=el.querySelector('#jmRodTop'),rodBot=el.querySelector('#jmRodBottom'),
      rollTop=el.querySelector('#jmRollTop'),rollBot=el.querySelector('#jmRollBottom'),
      win=el.querySelector('#jmWindow'),route=el.querySelector('#jmRoute'),
      routeGlow=el.querySelector('.jm-route-glow'),marker=el.querySelector('#jmMarker'),
      xMark=el.querySelector('#jmX'),caption=el.querySelector('#jmCaption'),
      chEl=el.querySelector('#jmCh'),lineEl=el.querySelector('#jmLine'),
      enterBtn=el.querySelector('#jmEnter'),lands=el.querySelectorAll('.jm-land'),
      statusTrack=el.querySelector('#jmStatusTrack'),statusCopy=el.querySelector('#jmStatusCopy'),
      disposeJourneyModel=null;

  if(window.mountJourneyModel){window.mountJourneyModel(el.querySelector('#jmModelCanvas')).then(function(dispose){disposeJourneyModel=dispose;}).catch(function(){});}

  /* window height = full sheet height once open; measure lazily */
  function sheetH(){return win.querySelector('.jm-sheet').getBoundingClientRect().height||win.clientWidth*0.64;}
  var routeLen=route.getTotalLength();
  route.style.strokeDasharray=routeLen;route.style.strokeDashoffset=routeLen;
  routeGlow.style.strokeDasharray=routeLen;routeGlow.style.strokeDashoffset=routeLen;

  /* ------- tiny critically-damped spring integrator -------------------------- */
  function Spring(x,k,d){this.x=x;this.v=0;this.t=x;this.k=k;this.d=d;}
  Spring.prototype.step=function(dt){
    var a=this.k*(this.t-this.x)-this.d*this.v;this.v+=a*dt;this.x+=this.v*dt;return this.x;};

  var uSpring=new Spring(1,150,22);        // voyage is visible immediately
  var uEdge=new Spring(1,90,17);
  var mSpring=new Spring(0,70,15);         // marker progress 0..1
  var descend=new Spring(1,90,14);
  descend.t=1;

  /* ------- readiness plumbing (reuses the island's own signals) -------------- */
  var shown=0,ready=false,revealing=false,start=Date.now(),unfoldStart=0,
      worldStarted=false,worldStartedAt=0,worldStableFrames=0,fastTrack=false;
  unfoldStart=performance.now();
  var statusNode=null,origLoader=null;
  function underlyingPct(){
    if(statusNode&&statusNode.isConnected){var tx=statusNode.textContent||'',mx=tx.match(/(\d+)\s*%/);
      if(/island ready/i.test(tx))return 100;if(mx)return parseInt(mx[1],10);}
    var n=document.querySelectorAll('p,span');
    for(var i=0;i<n.length;i++){var t=n[i].textContent||'';
      if(/island ready/i.test(t)){statusNode=n[i];return 100;}
      if(/raising the island/i.test(t)){statusNode=n[i];var m=t.match(/(\d+)\s*%/);if(m)return parseInt(m[1],10);}}
    return -1;
  }
  function travelBtn(){var b=document.getElementsByTagName('button');
    for(var i=0;i<b.length;i++){if(b[i]!==enterBtn&&/travel/i.test(b[i].textContent||''))return b[i];}return null;}
  function hideOrig(){
    if(origLoader&&origLoader.isConnected){origLoader.style.display='none';return;}
    origLoader=document.querySelector('[class*="#14110E"]');
    if(origLoader)origLoader.style.display='none';
  }
  function startWorld(){
    if(worldStarted)return;worldStarted=true;worldStartedAt=Date.now();
    var tb=travelBtn();
    if(tb){tb.click();}
    else{['keydown','keyup'].forEach(function(ty){var ev=new KeyboardEvent(ty,
      {key:'Enter',code:'Enter',keyCode:13,which:13,bubbles:true});
      window.dispatchEvent(ev);document.dispatchEvent(ev);});}
  }
  function markReady(){if(ready)return;ready=true;shown=100;el.classList.add('jm-ready');}
  function worldIsWarm(){
    if(!worldStarted)return false;
    var cv=document.getElementsByTagName('canvas'),painted=false;
    for(var i=0;i<cv.length;i++){var r=cv[i].getBoundingClientRect();
      if(r.width>200&&r.height>200&&cv[i].width>0&&cv[i].height>0){painted=true;break;}}
    /* Require consecutive painted frames, not merely a mounted canvas. The small
       time floor covers GPU shader compilation on slower laptops. */
    if(painted)worldStableFrames++;else worldStableFrames=0;
    return worldStableFrames>=60&&(Date.now()-worldStartedAt)>=(REDUCE?220:4400);
  }
  function loadFrac(){
    if(ready)return 1;
    var real=underlyingPct();
    var p=real>=0?real:Math.min(90,(Date.now()-start)/72);
    shown=Math.max(shown,p);return shown/100;
  }

  /* ------- caption + landmark state ----------------------------------------- */
  var curStop=-1;
  function showStop(i){
    if(i===curStop)return;curStop=i;var s=STOPS[i];
    statusTrack.style.width=((i+1)*20)+'%';statusCopy.textContent='Voyage · 0'+(i+1)+' / 05';
    caption.classList.remove('is-in');
    setTimeout(function(){chEl.textContent=s.ch;lineEl.textContent=s.line;
      caption.classList.add('is-in');},REDUCE?0:180);
  }
  function seeLand(i,active){
    var g=lands[i];if(!g)return;g.classList.add('is-seen');
    if(active){for(var k=0;k<lands.length;k++)lands[k].classList.remove('is-active');
      g.classList.add('is-active');}
  }

  /* map marker progress -> nearest stop index (for captions/activation) */
  function stopForT(t){var best=0;for(var i=0;i<STOPS.length;i++){if(t>=STOPS[i].t-0.02)best=i;}return best;}

  var MIN_ROUTE=REDUCE?300:4200;   // minimum drawing arc so it never flashes by
  var MIN_TOTAL=REDUCE?400:5200;   // minimum whole-sequence duration
  var last=performance.now(),routeSettled=false,settledT=0;

  function frame(now){
    if(done){return;}
    var dt=Math.min(0.05,(now-last)/1000);last=now;
    ensure();

    // 1) scroll descends & settles
    var dv=descend.step(dt);
    var sway=REDUCE?0:Math.sin(now/560)*(1-Math.min(1,dv))*3.2; // pendulum, fades on arrival
    var over=Math.max(0,dv-1);                                   // tiny landing overshoot handled by spring
    stage.style.transform='translateY('+((1-dv)*-124)+'vh) rotate('+sway*0.12+'deg)';

    // begin unfolding once the scroll has essentially arrived
    if(dv>0.9&&!unfoldStart){unfoldStart=now;uSpring.t=1;uEdge.t=1;}

    // 2) unfold — window height grows from centre; edges lag a touch
    var u=uSpring.step(dt),ue=uEdge.step(dt);
    var H=sheetH();
    win.style.height=Math.max(0,u*H)+'px';
    var half=H*0.5;
    rodTop.style.transform='translateX(-50%) translateY('+(-ue*half)+'px)';
    rodBot.style.transform='translateX(-50%) translateY('+(ue*half)+'px)';
    rollTop.style.transform='translateX(-50%) translateY('+(-ue*(half-28))+'px) scaleY('+(1-0.55*u)+')';
    rollBot.style.transform='translateX(-50%) translateY('+(ue*(half-28))+'px) scaleY('+(1-0.55*u)+')';

    // 3) trace the route + move the marker, gated by real load
    if(u>0.72&&!routeSettled){
      marker.classList.add('is-on');
      var elapsed=now-(unfoldStart||now);
      var byTime=Math.min(1,elapsed/MIN_ROUTE);
      var gate=ready?1:Math.min(0.92,0.14+0.86*loadFrac()); // can't finish until island ready
      mSpring.t=Math.min(byTime,gate);
      var mt=Math.max(0,Math.min(1,mSpring.step(dt)));
      settledT=mt;

      route.style.strokeDashoffset=routeLen*(1-mt);
      routeGlow.style.strokeDashoffset=routeLen*(1-mt);
      var L=routeLen*mt;
      var pos=route.getPointAtLength(L);
      var ahead=route.getPointAtLength(Math.min(routeLen,L+1.2));
      var ang=Math.atan2(ahead.y-pos.y,ahead.x-pos.x)*180/Math.PI;
      var bob=REDUCE?0:Math.sin(now/240)*0.8;
      marker.setAttribute('transform','translate('+pos.x+','+pos.y+') rotate('+ang+') translate(0,'+bob+')');

      // reveal landmarks as the ink reaches them; activate the current one
      for(var i=0;i<STOPS.length;i++){if(mt>=STOPS[i].t-0.03)seeLand(i,false);}
      var si=stopForT(mt);showStop(si);seeLand(si,true);

      // 4) arrival: release only when the actual WebGL world has painted steadily
      if(mt>=0.998){routeSettled=true;startWorld();el.classList.add('jm-warming');
        statusTrack.style.width='100%';statusCopy.textContent='Unlocking island';
        caption.classList.remove('is-in');
        setTimeout(function(){chEl.textContent='Island systems · Ready';
          lineEl.textContent='Lighting the paths, settling the weather…';caption.classList.add('is-in');},REDUCE?0:180);}
    }
    /* Once the route is drawn, stop touching SVG paths entirely so the island gets
       the full frame budget while its shaders and weather settle underneath. */
    if(routeSettled&&ready&&settledT>=0.985&&(fastTrack||(Date.now()-start)>=MIN_TOTAL)&&worldIsWarm()&&!revealing){beginReveal();}
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // keep evaluating readiness on a steady beat (cheap, matches old loader cadence)
  var iv=setInterval(function(){if(done)return;ensure();hideOrig();
    if(travelBtn()||underlyingPct()>=100)markReady();else loadFrac();},150);
  setTimeout(function(){if(!done)markReady();},22000); // hard safety net

  /* ------- the reveal: X stamp -> already-warm island ------------------------ */
  function beginReveal(){
    if(revealing||done)return;revealing=true;
    xMark.classList.add('is-stamped');
    showStop(STOPS.length-1);
    /* The world has already warmed behind us; retain only the tactile X-stamp beat. */
    el.classList.remove('jm-warming');
    setTimeout(openMap,REDUCE?0:760);
  }
  function openMap(){
    if(done)return;done=true;clearInterval(iv);if(mo){try{mo.disconnect();}catch(e){}}
    el.classList.add('jm-open');
    // fling the rods apart and lift the parchment away, then fade the whole overlay
    stage.style.transition='transform 1s cubic-bezier(.5,0,.2,1)';
    stage.style.transform='translateY(-8vh) scale(1.06)';
    rodTop.style.transition=rodBot.style.transition='transform .9s cubic-bezier(.5,0,.2,1)';
    rodTop.style.transform='translateX(-50%) translateY(-72vh)';
    rodBot.style.transform='translateX(-50%) translateY(72vh)';
    el.querySelector('.jm-scroll').style.transition='opacity .9s ease';
    el.querySelector('.jm-scroll').style.opacity='0';
    setTimeout(function(){el.classList.add('jm-gone');
      setTimeout(function(){if(disposeJourneyModel)disposeJourneyModel();if(el.parentNode)el.parentNode.removeChild(el);},1100);},420);
  }

  /* let a ready visitor skip straight to the arrival */
  enterBtn.addEventListener('click',function(){if(ready&&!revealing){fastTrack=true;mSpring.x=1;
    if(worldIsWarm())beginReveal();}});
  window.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&ready&&!revealing&&!done){e.stopPropagation();fastTrack=true;mSpring.x=1;
      if(worldIsWarm())beginReveal();}},true);
