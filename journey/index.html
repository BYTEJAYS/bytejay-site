/* ============================================================================
   The Journey — cinematic treasure-map loader
   A rolled parchment descends, unfolds, and traces Jay's real chapters
   (Origins · Discovery · The Search · The Detour · In Between) while the
   WebGL island loads behind it. When the island is truly ready AND the
   map sequence has run its minimum arc, the marker reaches the Isle of Jay,
   the shaders warm up behind the parchment, then the map opens to reveal it.
   Built to reuse the page's existing readiness signals (the "raising the
   island · N%" text + the "Travel" button) — no fake timers.
   ============================================================================ */
#jrny-map{--jm-ink:#19352d;--jm-paper:#e9efe6;--jm-paper-deep:#bdcab8;--jm-accent:#ef6845;--jm-water:#2f7568;
  position:fixed;inset:0;z-index:2147483647;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(125% 120% at 50% 0%,#1d3931 0%,#122720 46%,#091612 100%);
  color:#faf7f3;font-family:'Archivo',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:opacity 1.05s cubic-bezier(.22,1,.36,1);opacity:1}
#jrny-map.jm-gone{opacity:0;pointer-events:none}
/* faint dot-grid + heavy vignette so it reads as a lantern-lit map table */
#jrny-map::before{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(250,247,243,.05) 1px,transparent 1px);
  background-size:26px 26px;opacity:.5}
#jrny-map::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 100% at 50% 44%,transparent 46%,rgba(0,0,0,.66) 100%);
  transition:opacity .8s ease}

/* the moving scroll unit (perspective gives the paper a little real depth) */
.jm-stage{position:relative;width:min(940px,92vw);
  perspective:1700px;perspective-origin:50% 42%;
  will-change:transform;transform:translateY(-124vh);contain:layout paint}
.jm-scroll{position:relative;transform-style:preserve-3d}

/* wooden scroll rods, top & bottom */
.jm-rod{position:absolute;left:-3.4%;width:106.8%;height:26px;left:50%;
  transform:translateX(-50%);border-radius:14px;z-index:5;
  background:linear-gradient(180deg,#7c5230 0%,#5f3c20 12%,#8a5c34 32%,#4e3018 62%,#3a2312 100%);
  box-shadow:inset 0 2px 1px rgba(255,214,170,.45),inset 0 -4px 6px rgba(0,0,0,.5),
    0 10px 20px rgba(0,0,0,.42)}
.jm-rod::before,.jm-rod::after{content:"";position:absolute;top:50%;width:20px;height:34px;
  border-radius:7px;transform:translateY(-50%);
  background:radial-gradient(120% 120% at 35% 30%,#9a6a3c 0%,#6b4324 46%,#3a2312 100%);
  box-shadow:0 5px 10px rgba(0,0,0,.5),inset 0 2px 1px rgba(255,214,170,.5)}
.jm-rod::before{left:-16px}
.jm-rod::after{right:-16px}
.jm-rod--top{top:0}
.jm-rod--bottom{bottom:0}

/* the rolled-up lips just under each rod — thickness shrinks as it unrolls */
.jm-roll{position:absolute;left:50%;transform:translateX(-50%);width:99%;height:34px;z-index:4;
  background:linear-gradient(180deg,#d9c39a 0%,#c6ac7e 40%,#b2966a 72%,#93764c 100%);
  box-shadow:inset 0 3px 4px rgba(255,255,255,.4),0 8px 14px rgba(0,0,0,.4);
  transform-origin:50% 50%}
.jm-roll--top{top:20px;border-radius:6px 6px 3px 3px}
.jm-roll--bottom{bottom:20px;border-radius:3px 3px 6px 6px}

/* the parchment sheet — height animates open from the centre outward */
.jm-window{position:relative;width:99%;margin:0 auto;overflow:hidden;height:0;
  border-radius:3px;z-index:3;will-change:height;
  box-shadow:0 30px 50px rgba(0,0,0,.45)}
.jm-sheet{position:absolute;left:0;top:50%;transform:translateY(-50%);width:100%;
  aspect-ratio:1000/640;
  /* aged paper: warm base + uneven sun-bleaching + burnt edge vignette */
  background:
    radial-gradient(140% 120% at 22% 12%,rgba(255,255,255,.72) 0%,rgba(255,255,255,0) 55%),
    radial-gradient(120% 130% at 88% 96%,rgba(47,117,104,.2) 0%,rgba(47,117,104,0) 52%),
    radial-gradient(160% 150% at 50% 50%,#f5f7f1 0%,var(--jm-paper) 48%,#d8e1d4 76%,var(--jm-paper-deep) 100%);
  -webkit-mask:var(--deckle);mask:var(--deckle);
  -webkit-mask-size:100% 100%;mask-size:100% 100%}
/* fibrous grain + faint fold creases layered over the paper */
.jm-sheet::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:var(--fibre);background-size:340px 340px;opacity:.5;mix-blend-mode:multiply}
.jm-sheet::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:
    linear-gradient(90deg,transparent 33%,rgba(35,82,68,.09) 33.3%,transparent 33.6%),
    linear-gradient(90deg,transparent 66%,rgba(35,82,68,.07) 66.3%,transparent 66.6%),
    linear-gradient(0deg,transparent 49.6%,rgba(35,82,68,.08) 50%,transparent 50.4%);
  opacity:.6;mix-blend-mode:multiply}

.jm-svg{position:absolute;inset:0;width:100%;height:100%;display:block}

/* corner titles engraved on the map */
.jm-eyebrow{position:absolute;left:5.4%;top:6%;z-index:4;margin:0;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:clamp(8px,1vw,11px);letter-spacing:.34em;text-transform:uppercase;
  color:rgba(25,53,45,.64)}
.jm-heading{position:absolute;right:5.4%;top:5%;z-index:4;margin:0;text-align:right;
  font-weight:800;letter-spacing:-.02em;line-height:.9;
  font-size:clamp(1.5rem,4vw,2.6rem);color:var(--jm-ink);
  text-shadow:0 1px 0 rgba(255,255,255,.35)}
.jm-heading small{display:block;font-family:'Newsreader',Georgia,serif;font-style:italic;
  font-weight:400;font-size:.42em;letter-spacing:0;color:rgba(25,53,45,.64);margin-top:.35em}

/* the narrative caption that crossfades as the marker reaches each landmark */
.jm-caption{position:absolute;left:0;right:0;bottom:6.5%;z-index:6;text-align:center;
  padding:0 8%;pointer-events:none}
.jm-caption .jm-chapter{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  font-size:clamp(8px,1vw,10px);letter-spacing:.32em;text-transform:uppercase;
  color:rgba(25,53,45,.58)}
.jm-caption .jm-line{margin-top:6px;font-family:'Newsreader',Georgia,serif;font-style:italic;
  font-size:clamp(1rem,2.6vw,1.5rem);color:#183b31;line-height:1.2}
.jm-caption .jm-swap{display:inline-block;opacity:0;transform:translateY(9px);
  transition:opacity .5s ease,transform .55s cubic-bezier(.22,1,.36,1)}
.jm-caption.is-in .jm-swap{opacity:1;transform:none}

/* SVG landmark + route styling */
.jm-terrain{opacity:.9}
.jm-route{fill:none;stroke:var(--jm-accent);stroke-width:3.4;stroke-linecap:round;
  stroke-dasharray:2 11}
.jm-route-glow{fill:none;stroke:var(--jm-accent);stroke-width:8;stroke-linecap:round;
  opacity:.16;filter:blur(4px)}
.jm-land{opacity:0;transition:opacity .6s ease}
.jm-land.is-seen{opacity:1}
.jm-land .jm-ink{stroke:var(--jm-ink);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.jm-land .jm-fillink{fill:var(--jm-ink)}
.jm-land .jm-pin{fill:var(--jm-accent);opacity:0}
.jm-land.is-active .jm-pin{opacity:1}
.jm-land .jm-halo{fill:var(--jm-accent);opacity:0;transform-box:fill-box;transform-origin:center}
.jm-land.is-active .jm-halo{animation:jmpulse 1.9s ease-out infinite}
.jm-label{font-family:'Archivo',sans-serif;font-weight:700;font-size:15px;fill:var(--jm-ink);
  letter-spacing:.01em}
.jm-label--num{font-family:'Newsreader',Georgia,serif;font-style:italic;font-weight:500;
  font-size:13px;fill:rgba(25,53,45,.64)}
@keyframes jmpulse{0%{opacity:.42;transform:scale(1)}70%{opacity:0;transform:scale(3.4)}
  100%{opacity:0;transform:scale(3.4)}}

/* the travelling compass marker */
.jm-marker{opacity:0;transition:opacity .5s ease}
.jm-marker.is-on{opacity:1}
.jm-marker .jm-disc{fill:#faf7f3;stroke:var(--jm-ink);stroke-width:2.4}
.jm-marker .jm-needle-n{fill:var(--jm-accent)}
.jm-marker .jm-needle-s{fill:var(--jm-ink)}
.jm-marker .jm-ring{fill:none;stroke:var(--jm-accent);stroke-width:2;opacity:.5}
.jm-marker .jm-trail{fill:var(--jm-accent)}

/* the X that stamps onto the destination */
.jm-x{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(2.4) rotate(-12deg)}
.jm-x.is-stamped{opacity:1;transform:scale(1) rotate(-8deg);
  transition:opacity .28s ease,transform .34s cubic-bezier(.34,1.7,.5,1)}
.jm-x path{stroke:var(--jm-accent);stroke-width:5;stroke-linecap:round}

/* a quiet enter affordance if the visitor wants to skip ahead once ready */
.jm-enter{position:absolute;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);
  z-index:8;opacity:0;pointer-events:none;cursor:pointer;
  border:1px solid rgba(250,247,243,.55);border-radius:999px;background:transparent;
  color:rgba(250,247,243,.82);padding:9px 20px;font:600 12px 'Archivo',sans-serif;
  letter-spacing:.14em;text-transform:uppercase;
  transition:opacity .6s ease,transform .6s cubic-bezier(.22,1,.36,1),
    background-color .25s ease,color .25s ease}
#jrny-map.jm-ready .jm-enter{opacity:1;transform:translateX(-50%);pointer-events:auto}
.jm-enter:hover{background:rgba(250,247,243,.94);color:#141210;border-color:rgba(250,247,243,.94)}

@media (prefers-reduced-motion:reduce){
  #jrny-map,#jrny-map *{transition-duration:.001s!important;animation:none!important}
}
</style>
